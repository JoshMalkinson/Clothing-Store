name: Deploy to GitHub Pages

on:
  # Deploy on every push to the default branch
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Permissions required to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        # Installs dependencies, runs `astro build`, and uploads the
        # ./dist folder as a Pages artifact. Reads `base` from astro.config.
        uses: withastro/action@v3
        env:
          PUBLIC_SUPABASE_URL: https://wximwpynlykkdlotnjnx.supabase.co
          PUBLIC_SUPABASE_ANON_KEY: ${{ vars.PUBLIC_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4aW13cHlubHlra2Rsb3Ruam54Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMTM5MjYsImV4cCI6MjA5Nzg4OTkyNn0.ikiV9unk76MoXNt0Vj_LCVx_gvM39X5JtlHcffOCno4' }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
